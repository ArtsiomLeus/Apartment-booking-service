spring:
  application:
    name: booking-service

    datasource:
      url: jdbc:postgresql://localhost:5432/booking_db
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver

    jpa:
      hibername:
        ddl-auto: validate
        show-sql: true
        properties:
        ibernate:
        format_sql: true
        dialect: ogr.hibernate.dialect.PostgreSQLDialect
        jdbc:
        batch_size: 20
        order_inserts: true

    liquibase:
      enabled: true
      change-log: classpath:db/changelog/db/changelog-master.yaml

    logging:
      level:
        org.springframework.security: DEBUG
        com.booking: DEBUG
        org.hibernate.SQL: DEBUG

    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
      expiration: 86400000
      refresh-expiration: 604800000

    server:
      pors: 8080
      servlet:
        context-path: /api/v1