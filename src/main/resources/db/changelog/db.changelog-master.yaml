databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: postgres
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: full_name
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: varchar(13)
              - column:
                  name: role
                  type: varchar(20)
                  defaultValue: "GUEST"
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  defaultValueComputed: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTANP"
              - column:
                  name: updates_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTANP"
  - changeSet:
      id: 002-add-users-indexes
      author: postgres
      changes:
        - createIndex:
            tableName: users
            indexName: idx_users_email
            columns:
              - column:
                  name: email
        - createIndex:
            tableName: users
            indexName: idx_users_role
            columns:
              - column:
                  name: role
