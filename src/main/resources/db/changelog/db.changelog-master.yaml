databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: postgres
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: full_name
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: varchar(13)
              - column:
                  name: role
                  type: varchar(20)
                  defaultValue: "GUEST"
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTANP"
              - column:
                  name: updates_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTANP"
  - changeSet:
      id: 002-add-users-indexes
      author: postgres
      changes:
        - createIndex:
            tableName: users
            indexName: idx_users_email
            columns:
              - column:
                  name: email
        - createIndex:
            tableName: users
            indexName: idx_users_role
            columns:
              - column:
                  name: role

  - changeSet:
      id: 003:-create-apartments-table
      author: postgres
      changes:
        - createTable:
            tableName: apartments
            columns:
              - column:
                name: id
                type: BIGINT
                constraints:
                  primaryKey: true
                  nullable: false
              - column:
                name: owner_id
                type: BIGINT
                constraints:
                  nullable: false
                  references: urers(id)
                  deletCascade: true
              - column:
                  name: title
                  type: VARCHAR(200)
                  constaints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT

              - column:
                  name: price_per_night
                  type: INT
                  constaints:
                    nullable: false
              - column:
                  name: address
                  type: VARCHAR(255)
                  constaints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(100)
                  constaints:
                    nullable: false
              - column:
                  name: max_guests
                  type: INT
                  defaultValue: "1"
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTAMP"

  - changeSet:
      id: 004-add-apartments-indexes
      author: postgres
      changes:
          - createIndex:
              tableName: apartments
              indexName: idx_apartments_owner
              columns:
                - column:
                    name: owner_id
          - createIndex:
              tableName: apartments
              indexName: idx_apartments_city
              columns:
                - column:
                    name: city
          - createIndex:
              tableName: apartments
              indexName: idx_apartments_price
              columns:
                - column:
                    name: price_per_night
          - createIndex:
              tableName: apartments
              indexName: idx_apartments_city_active
              columns:
                - column:
                    name: city
                - column:
                    name: is_active

  - changeSet:
      id: 005-add-bookings-table
      author: postgres
      changes:
        - createTeable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: apartment_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    references: apartments(id)
                    deleteCascade: true
              - column:
                  name: guest_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: total_price
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: "PENDING"
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValue: "0"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"

        - addCheckConstraint:
           tableName: bookings
           constraintName: check_dates
           constraint: start_date < end_date

  - changeSet:
      id: 006-add-bookings-indexes
      author: postgres
      changes:
        - createIndex:
            tableName: bookings
            indexName: idx_bookings_apartment_dates
            columns:
              - column:
                  name: apartment_id
              - column:
                  name: start_date
              - column:
                  name: end_date
        - createIndex:
            tableName: bookings
            indexName: idx_bookings_guest_id
            columns:
              - column:
                  name: guest_id
        - createIndex:
            tableName: bookings
            indexName: idx_bookings_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: bookings
            indexName: idx_bookings_active_conflicts
            columns:
              - column:
                  name: apartment_id
              - column:
                  name: start_date
              - column:
                  name: end_date
            where: "status IN ('PENDING', 'CONFIRMED')"













